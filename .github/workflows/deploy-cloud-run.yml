name: Deploy Frontend to Cloud Run
on:
  push:
    branches:
      - main
env:
  PROJECT_ID: braided-visitor-484216-i0
  REGION: europe-west1
  SERVICE_NAME: themison-frontend-eu
  ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev/braided-visitor-484216-i0/themison-repo-eu
  IMAGE_NAME: themison-frontend
jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Authenticate Docker to Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build and Push Docker image
        run: |
          IMAGE_PATH="${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_AUTH0_DOMAIN=${{ secrets.NEXT_PUBLIC_AUTH0_DOMAIN }} \
            --build-arg NEXT_PUBLIC_AUTH0_CLIENT_ID=${{ secrets.NEXT_PUBLIC_AUTH0_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_AUTH0_AUDIENCE=${{ secrets.NEXT_PUBLIC_AUTH0_AUDIENCE }} \
            --build-arg NEXT_PUBLIC_UPLOAD_API_KEY=${{ secrets.NEXT_PUBLIC_UPLOAD_API_KEY }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} 
            -t "$IMAGE_PATH" .

          docker push "$IMAGE_PATH"
      - name: Deploy to Cloud Run
        run: |
          IMAGE_PATH="${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE_PATH" \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --memory 512Mi \
            --cpu 1 \
            --port 3000 \
            --allow-unauthenticated
          # Note: Existing environment variables and traffic settings in Cloud Run are preserved automatically
